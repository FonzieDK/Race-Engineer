name: Check

on: [push, pull_request]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install -r requirements/runtime.txt -r requirements/build.txt
      - run: npm ci
      - run: npm run check
